<!doctype html>
<html lang="en">

<head>
  <link rel="stylesheet" href="/frontend/src/admin-links.css">
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accueil - QuickLink</title>
</head>

<body>
    <div class="header">
        <h1>Admin - Tous les liens raccourcis</h1>
        <div style="display: flex; gap: 10px;">
            <a href="manage-users.html" style="padding: 8px 16px; background-color: #17a2b8; color: white; text-decoration: none; border-radius: 4px; cursor: pointer;">👥 Gérer les utilisateurs</a>
            <button class="logout-btn" onclick="logout()">Déconnexion</button>
        </div>
    </div>

    <div id="error" class="error" style="display: none;"></div>
    <div id="loader" class="loader" style="display: none;">Chargement des liens...</div>

    <table id="linksTable" style="display: none;">
        <thead>
            <tr>
                <th>Code court</th>
                <th>URL original</th>
                <th>URL raccourci</th>
                <th>Clics</th>
                <th>Créé le</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="linksBody">
        </tbody>
    </table>

    <div id="noLinks" class="no-links" style="display: none;">Aucun lien trouvé</div>
  
  <script type="module" src="/frontend/src/admin-links.js"></script>
</body>

</html>
